spring.application.name=rag-knowledge-assistant
server.port=${APP_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/rag_assistant}
spring.datasource.username=${DB_USERNAME:rag_user}
spring.datasource.password=${DB_PASSWORD:rag_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:25MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:25MB}

app.ai.provider=${AI_PROVIDER:stub}
app.ai.embedding-base-url=${AI_EMBEDDING_BASE_URL:http://localhost:11434/v1}
app.ai.chat-base-url=${AI_CHAT_BASE_URL:http://localhost:11434/v1}
app.ai.api-key=${AI_API_KEY:change-me}
app.ai.embedding-model=${AI_EMBEDDING_MODEL:text-embedding-3-small}
app.ai.chat-model=${AI_CHAT_MODEL:gpt-4o-mini}

app.documents.repo-path=${DOCUMENT_REPO_PATH:data/documents}
app.documents.startup-refresh-enabled=${DOCUMENT_STARTUP_REFRESH_ENABLED:true}
